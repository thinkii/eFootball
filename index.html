<!DOCTYPE html>
<html lang="es" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x.com/thinkiiCS</title>
<link rel="icon" href="https://i.gyazo.com/c5b73a35a20fdfc6d9bbab28768ecc21.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:#f5f5f3;--surface:#ffffff;--surface2:#f0efeb;
    --border:rgba(0,0,0,0.09);--border-strong:rgba(0,0,0,0.18);
    --text:#0b0b0b;--text2:#52514e;--text3:#898781;--radius:8px;
  }
  [data-mode=dark] {
    --bg:#111110;--surface:#1a1a19;--surface2:#222221;
    --border:rgba(255,255,255,0.09);--border-strong:rgba(255,255,255,0.18);
    --text:#ffffff;--text2:#c3c2b7;--text3:#898781;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;min-height:100vh;transition:background 0.2s,color 0.2s;}
  .container{max-width:780px;margin:0 auto;padding:2rem 1rem;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .total-badge{background:#dbeafe;color:#1e40af;border:0.5px solid #93c5fd;border-radius:20px;padding:4px 14px;font-size:13px;font-weight:500;}
  [data-mode=dark] .total-badge{background:#1e3a5f;color:#93c5fd;border-color:#2563eb;}
  .btn{background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
  .btn:hover{color:var(--text);}
  .controls{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  .sort-group{display:flex;gap:4px;}
  .sort-btn{background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
  .sort-btn.active{background:#dbeafe;border-color:#93c5fd;color:#1e40af;font-weight:500;}
  [data-mode=dark] .sort-btn.active{background:#1e3a5f;color:#93c5fd;border-color:#2563eb;}
  .search-wrap{position:relative;flex:1;min-width:160px;}
  .search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none;}
  #search{width:100%;padding:5px 10px 5px 28px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;outline:none;}
  #search:focus{border-color:#93c5fd;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
  .filter-btn{background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
  .filter-btn:hover{border-color:var(--border-strong);color:var(--text);}

  /* stats row */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem;}
  .stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;}
  .stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
  .stat-val{font-size:22px;font-weight:600;color:var(--text);}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}

  /* chart */
  .chart-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1.25rem;}
  .chart-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:0.75rem;}
  .chart-inner{position:relative;height:180px;}

  /* pending section */
  .pending-section{margin-bottom:1.25rem;}
  .pending-title{font-size:11px;font-weight:600;color:#e34948;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
  .pending-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .pending-pill{background:rgba(227,73,72,0.1);border:0.5px solid rgba(227,73,72,0.35);border-radius:20px;padding:4px 12px;font-size:12px;color:#e34948;}

  /* skills */
  .section{margin-bottom:1.25rem;}
  .section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:5px;}
  .section-count{font-size:10px;font-weight:400;color:var(--text3);margin-left:4px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  @media(max-width:500px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:background 0.15s,border-color 0.15s,max-height 0.25s ease;border-left-width:3px;}
  .card:hover{background:var(--surface2);border-color:var(--border-strong);}
  .card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .card-name{font-size:13px;font-weight:600;flex:1;min-width:0;}
  .card-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .bar-wrap{width:40px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .bar{height:100%;border-radius:3px;}
  .score{font-size:13px;font-weight:600;min-width:20px;text-align:right;}
  .desc{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5;overflow:hidden;max-height:0;transition:max-height 0.25s ease,margin-top 0.2s;}
  .card.open .desc{max-height:80px;margin-top:6px;}
  .card.open{background:var(--surface2);}
  .no-results{text-align:center;color:var(--text3);font-size:13px;padding:2rem 0;}
  .hint{font-size:11px;color:var(--text3);text-align:center;margin-top:1rem;}
</style>
</head>
<body>
<div class="container">
  <div class="header-top">
    <h1><i class="ti ti-ball-football"></i>Habilidades eFootball de <a href="https://x.com/thinkiiCS" target="_blank" rel="noopener noreferrer">@thinkiiCS</a></h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="total-badge" id="total-badge">Total: 226</span>
      <button class="btn" onclick="window.open('https://github.com/thinkii/eFootball/edit/main/index.html','_blank')"><i class="ti ti-edit"></i> Editar</button>
      <button class="btn" onclick="toggleDark()" id="dark-btn"><i class="ti ti-sun"></i> Claro</button>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input id="search" type="text" placeholder="Buscar habilidad..." oninput="render()">
    </div>
    <span style="font-size:12px;color:var(--text3)">Orden:</span>
    <div class="sort-group">
      <button class="sort-btn active" onclick="setSort('score')">Puntuación</button>
      <button class="sort-btn" onclick="setSort('alpha')">Alfabético</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>

  <!-- Stats row -->
  <div class="stats-row" id="stats-row"></div>

  <!-- Chart -->
  <div class="chart-wrap" id="chart-wrap">
    <div class="chart-title"><i class="ti ti-chart-bar" style="font-size:11px;vertical-align:-1px;margin-right:4px;"></i>Puntos por categoría</div>
    <div class="chart-inner"><canvas id="catChart" role="img" aria-label="Gráfico de puntos por categoría"></canvas></div>
  </div>

  <!-- Pending -->
  <div class="pending-section" id="pending-section"></div>

  <div id="content"></div>
  <p class="hint"><i class="ti ti-hand-click" style="font-size:12px;vertical-align:-1px;margin-right:3px;"></i>Toca una habilidad para ver su descripción</p>
</div>
<script>
const CAT_COLORS = {
  'Habilidades defensivas': { bar:'#1baf7a', light:'#d6f0e3', text:'#0a5c30' },
  'Habilidades de regate':  { bar:'#4a3aa7', light:'#e0dcfa', text:'#2e1f8a' },
  'Habilidades de pase':    { bar:'#2a78d6', light:'#dbeafe', text:'#1e40af' },
  'Habilidades de tiro':    { bar:'#e34948', light:'#fad6d6', text:'#a02020' },
  'Otras habilidades':      { bar:'#eda100', light:'#faf0d0', text:'#7a5500' },
};
const CAT_ICONS = {
  'Habilidades defensivas':'ti-shield','Habilidades de regate':'ti-run',
  'Habilidades de pase':'ti-arrow-right','Habilidades de tiro':'ti-target','Otras habilidades':'ti-sparkles'
};
const scores = {
  "Amago por detrás y giro":7,"As en la manga":5,"Bloqueador":7,"Bicicleta":3,
  "Cabeceador":7,"Capitanía":5,"Control con la suela":12,"Croqueta":4,
  "Delantero atrasado":4,"Despeje acrobático":3,"Disparo ascendente":4,
  "Disparo descendente":5,"Disparo sin rotación":5,"Disparo lejano con rosca":6,
  "Elástica":0,"Entrada deslizante":6,"Especialista en penaltis":3,
  "Espíritu de lucha":0,"Espuela":6,"Finalización acrobática":5,
  "Golpeo con rosca":8,"Interceptador":15,"Marcaje":8,"Marsellesa":6,
  "Pase al primer toque":7,"Pase en profundidad":11,"Pase al hueco":6,
  "Pase cruzado":6,"Picardía":7,"Pase sin mirar":4,"Pase bombeado bajo":5,
  "Rabona":5,"Rebote interior":2,"Recorte con giro":5,"Remate al primer toque":10,
  "Saque de banda largo":1,"Superioridad aérea":11,"Sombrero":5,
  "Tiro de larga distancia":3,"Vaselina":4
};
const allSkills = [
  ["Despeje acrobático","Habilidades defensivas","Permite despejar el balón con los pies desde posiciones difíciles."],
  ["Marcaje","Habilidades defensivas","Permite pegarse y perseguir al rival de forma persistente."],
  ["Superioridad aérea","Habilidades defensivas","Mejora las opciones de ganar duelos aéreos."],
  ["Interceptador","Habilidades defensivas","Mejora las habilidades de interceptación."],
  ["Delantero atrasado","Habilidades defensivas","Presiona agresivamente al rival desde la delantera."],
  ["Bloqueador","Habilidades defensivas","Mejora las opciones de bloquear pases y disparos."],
  ["Entrada deslizante","Habilidades defensivas","Mejora las opciones de ganar el balón con una entrada."],
  ["Elástica","Habilidades de regate","Ejecuta la Elástica."],
  ["Rebote interior","Habilidades de regate","Ejecuta el Rebote interior."],
  ["Marsellesa","Habilidades de regate","Ejecuta la Marsellesa."],
  ["Rabona","Habilidades de regate","Ejecuta la Rabona para pasar o disparar por sorpresa."],
  ["Bicicleta","Habilidades de regate","Ejecuta la Bicicleta a alta velocidad."],
  ["Control con la suela","Habilidades de regate","Permite el control con la suela para amagos y giros."],
  ["Sombrero","Habilidades de regate","Ejecuta el Sombrero."],
  ["Amago por detrás y giro","Habilidades de regate","Permite al jugador pasar el balón entre sus pies y girar 180 grados."],
  ["Croqueta","Habilidades de regate","Permite ejecutar la Croqueta. Resetea el equilibrio. Con croqueta + tiro/pase la precisión es de 100%."],
  ["Recorte con giro","Habilidades de regate","Ejecuta el Recorte con giro rápidamente."],
  ["Picardía","Otras habilidades","Permite generar faltas con más facilidad."],
  ["Espuela","Otras habilidades","Permite pasar y disparar con el talón desde posiciones difíciles."],
  ["As en la manga","Otras habilidades","Aumenta la Actitud ofensiva y la Finalización en un 5%."],
  ["Cabeceador","Otras habilidades","Aumenta la frecuencia de cabezazos hacia abajo para mayor precisión."],
  ["Capitanía","Otras habilidades","Inspira al equipo, reduciendo los efectos de la fatiga para todos."],
  ["Espíritu de lucha","Otras habilidades","Reduce el error de pases y disparos cuando hay rivales cerca."],
  ["Pase sin mirar","Habilidades de pase","Permite pases que despistan a los rivales."],
  ["Pase cruzado","Habilidades de pase","El pase raso y bombeado aumentan un 10% según el botón pulsado."],
  ["Pase en profundidad","Habilidades de pase","El pase raso y bombeado aumentan un 20% según el botón pulsado."],
  ["Pase al primer toque","Habilidades de pase","Reduce el error del pase al primer toque."],
  ["Pase bombeado bajo","Habilidades de pase","Pase bombeado largo con trayectoria baja y precisa."],
  ["Pase al hueco","Habilidades de pase","Imprime retroceso a balones bombeados para que se frenen al tocar el césped."],
  ["Saque de banda largo","Habilidades de pase","Mejora el alcance de los saques de banda largos."],
  ["Especialista en penaltis","Habilidades de tiro","Aumenta la finalización y el tiro libre un 10% en penaltis."],
  ["Tiro de larga distancia","Habilidades de tiro","Aumenta la finalización un 10%."],
  ["Remate al primer toque","Habilidades de tiro","Reduce el error del disparo al primer toque."],
  ["Disparo lejano con rosca","Habilidades de tiro","Aumenta Finalización y Potencia de tiro más de un 10% con efecto."],
  ["Finalización acrobática","Habilidades de tiro","Añade animaciones a disparos: escorpión, chilena, etc."],
  ["Golpeo con rosca","Habilidades de tiro","Permite disparar y pasar con el exterior del pie a larga distancia."],
  ["Disparo ascendente","Habilidades de tiro","Disparos con trayectoria baja que suben bruscamente."],
  ["Disparo descendente","Habilidades de tiro","Disparos con efecto top spin que rebotan de forma errática ante el portero."],
  ["Disparo sin rotación","Habilidades de tiro","Permite golpeos sin efecto con mayor facilidad."],
  ["Vaselina","Habilidades de tiro","Permite vaselinas precisas."],
];
const MAX = 15;
const CAT_ORDER = ['Habilidades defensivas','Habilidades de regate','Habilidades de pase','Habilidades de tiro','Otras habilidades'];
let currentCat = 'Todas', currentSort = 'score', darkMode = true;
let chartInstance = null;

function getScore(name) {
  for (const [k,v] of Object.entries(scores)) {
    if (k.toLowerCase()===name.toLowerCase()) return v;
  }
  return null;
}

function toggleDark() {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-mode', darkMode ? 'dark' : '');
  document.getElementById('dark-btn').innerHTML = darkMode
    ? '<i class="ti ti-sun"></i> Claro' : '<i class="ti ti-moon"></i> Oscuro';
  renderChart();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', (s==='score' && b.textContent.trim()==='Puntuación') || (s==='alpha' && b.textContent.trim()==='Alfabético'))
  );
  render();
}

function setFilter(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  const chartWrap = document.getElementById('chart-wrap');
  const statsRow = document.getElementById('stats-row');
  const pendingSec = document.getElementById('pending-section');
  chartWrap.style.display = cat === 'Todas' ? '' : 'none';
  statsRow.style.display = cat === 'Todas' ? '' : 'none';
  pendingSec.style.display = cat === 'Todas' ? '' : 'none';
  render();
}

function makeCard(name, desc, col) {
  const s = getScore(name);
  const pct = s !== null ? Math.round((s/MAX)*100) : 0;
  const scoreColor = s===null ? '' : s===0 ? '#e34948' : s>=8 ? '#2a78d6' : s>=4 ? '#888' : '#bbb';
  const scoreHtml = s !== null
    ? `<div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${col.bar}"></div></div><span class="score" style="color:${scoreColor}">${s}</span>`
    : `<span style="font-size:11px;color:var(--text3);font-style:italic">—</span>`;
  return `<div class="card" style="border-left-color:${col.bar}" onclick="this.classList.toggle('open')">
    <div class="card-top">
      <span class="card-name">${name}</span>
      <div class="card-right">${scoreHtml}</div>
    </div>
    <div class="desc">${desc}</div>
  </div>`;
}

function renderStats() {
  const total = Object.values(scores).reduce((a,b)=>a+b,0);
  const pending = allSkills.filter(s => (getScore(s[0])??0) === 0);
  const maxPossible = allSkills.length * MAX;
  const pct = Math.round((total/maxPossible)*100);
  const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Puntos totales</div>
      <div class="stat-val">${total}</div>
      <div class="stat-sub">de ${maxPossible} posibles</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Progreso</div>
      <div class="stat-val">${pct}%</div>
      <div class="stat-sub">${allSkills.length} habilidades</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pendientes</div>
      <div class="stat-val" style="color:#e34948">${pending.length}</div>
      <div class="stat-sub">a puntuación 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mejor habilidad</div>
      <div class="stat-val" style="font-size:15px;margin-top:2px">${best[0]}</div>
      <div class="stat-sub">${best[1]} puntos</div>
    </div>`;
}

function renderPending() {
  const pending = allSkills.filter(s => (getScore(s[0])??0) === 0);
  if (!pending.length) { document.getElementById('pending-section').innerHTML = ''; return; }
  document.getElementById('pending-section').innerHTML = `
    <div class="pending-title"><i class="ti ti-alert-circle" style="font-size:11px;"></i>Pendientes (${pending.length})</div>
    <div class="pending-grid">${pending.map(([n]) => `<span class="pending-pill">${n}</span>`).join('')}</div>`;
}

function renderChart() {
  const catTotals = CAT_ORDER.map(cat => {
    const catSkills = allSkills.filter(s=>s[1]===cat);
    return catSkills.reduce((sum,[n])=>sum+(getScore(n)??0),0);
  });
  const catMax = CAT_ORDER.map(cat => allSkills.filter(s=>s[1]===cat).length * MAX);
  const labels = CAT_ORDER.map(c => c.replace('Habilidades ','').replace('Otras ','Otras '));
  const barColors = CAT_ORDER.map(c => CAT_COLORS[c].bar);

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const ctx = document.getElementById('catChart').getContext('2d');
  const textColor = darkMode ? '#898781' : '#52514e';
  const gridColor = darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Puntos', data: catTotals, backgroundColor: barColors, borderRadius: 4, borderSkipped: false },
        { label: 'Máximo', data: catMax, backgroundColor: darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)', borderRadius: 4, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ctx.datasetIndex===0 ? ` ${ctx.raw} pts` : ` máx ${ctx.raw}` }
      }},
      scales: {
        x: { stacked: false, ticks: { color: textColor, font: { size: 11 } }, grid: { display: false }, border: { display: false } },
        y: { ticks: { color: textColor, font: { size: 11 } }, grid: { color: gridColor }, border: { display: false } }
      }
    }
  });
}

function render() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const filtered = allSkills.filter(s => {
    const catOk = currentCat==='Todas' || s[1]===currentCat;
    const searchOk = !query || s[0].toLowerCase().includes(query) || s[2].toLowerCase().includes(query);
    return catOk && searchOk;
  });
  const sorted = [...filtered].sort((a,b) => {
    if (currentSort==='score') {
      const sa=getScore(a[0])??-1, sb=getScore(b[0])??-1;
      return sb-sa || a[0].localeCompare(b[0]);
    }
    return a[0].localeCompare(b[0]);
  });
  const totalScore = Object.values(scores).reduce((a,b)=>a+b,0);
  document.getElementById('total-badge').textContent = currentCat==='Todas' && !query
    ? `Total: ${totalScore}` : `${sorted.length} habilidades`;

  const content = document.getElementById('content');
  if (!sorted.length) { content.innerHTML = '<div class="no-results"><i class="ti ti-search-off"></i><br>Sin resultados</div>'; return; }

  if (currentCat==='Todas' && !query) {
    content.innerHTML = CAT_ORDER.map(cat => {
      const catSkills = sorted.filter(s=>s[1]===cat);
      if (!catSkills.length) return '';
      const col = CAT_COLORS[cat];
      const icon = CAT_ICONS[cat]||'ti-star';
      const catTotal = catSkills.reduce((sum,[n])=>sum+(getScore(n)??0),0);
      const catMax = catSkills.length * MAX;
      return `<div class="section">
        <div class="section-title"><i class="ti ${icon}"></i>${cat}<span class="section-count">${catTotal}/${catMax} pts · ${catSkills.length} hab.</span></div>
        <div class="grid">${catSkills.map(([n,,d])=>makeCard(n,d,col)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    const col = currentCat!=='Todas' ? CAT_COLORS[currentCat] : { bar:'#2a78d6' };
    content.innerHTML = `<div class="grid">${sorted.map(([n,c,d])=>makeCard(n,d,CAT_COLORS[c]||col)).join('')}</div>`;
  }
}

// Build filters
const cats = ['Todas',...CAT_ORDER];
const filtersEl = document.getElementById('filters');
cats.forEach(cat => {
  const col = CAT_COLORS[cat];
  const catCount = cat==='Todas' ? allSkills.length : allSkills.filter(s=>s[1]===cat).length;
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat==='Todas' ? ' active' : '');
  btn.dataset.cat = cat;
  btn.textContent = cat==='Todas' ? `Todas · ${catCount}` : `${cat.replace('Habilidades ','')} · ${catCount}`;
  if (col) btn.style.cssText = `border-color:${col.bar};color:${col.text}`;
  btn.addEventListener('click', () => {
    setFilter(cat);
    document.querySelectorAll('.filter-btn').forEach(b => {
      const c = CAT_COLORS[b.dataset.cat];
      if (c) b.style.cssText = b.classList.contains('active')
        ? `background:${c.light};border-color:${c.bar};color:${c.text};font-weight:500`
        : `border-color:${c.bar};color:${c.text}`;
      else b.style.cssText = b.classList.contains('active') ? 'font-weight:500' : '';
    });
  });
  filtersEl.appendChild(btn);
});

renderStats();
renderPending();
renderChart();
render();
</script>
</body>
</html>
