<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habilidades eFootball</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0efeb;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.18);
    --text: #0b0b0b;
    --text2: #52514e;
    --text3: #898781;
    --radius: 8px;
  }
  [data-mode=dark] {
    --bg: #111110;
    --surface: #1a1a19;
    --surface2: #222221;
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.18);
    --text: #ffffff;
    --text2: #c3c2b7;
    --text3: #898781;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }
  .container { max-width: 780px; margin: 0 auto; padding: 2rem 1rem; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .total-badge { background: #dbeafe; color: #1e40af; border: 0.5px solid #93c5fd; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 500; }
  [data-mode=dark] .total-badge { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; }
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap; }
  .sort-group { display: flex; gap: 4px; }
  .sort-btn { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 4px 12px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .sort-btn.active { background: #dbeafe; border-color: #93c5fd; color: #1e40af; font-weight: 500; }
  [data-mode=dark] .sort-btn.active { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; }
  .dark-toggle { margin-left: auto; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 4px 12px; font-size: 12px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .filter-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-btn.active { font-weight: 500; }
  .section { margin-bottom: 1.25rem; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; display: flex; align-items: center; gap: 5px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; cursor: pointer; transition: background 0.15s, border-color 0.15s; border-left-width: 3px; }
  .card:hover { background: var(--surface2); border-color: var(--border-strong); }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; }
  .card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .bar-wrap { width: 40px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar { height: 100%; border-radius: 3px; }
  .score { font-size: 13px; font-weight: 600; min-width: 20px; text-align: right; }
  .desc { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.5; display: none; }
  .card.open .desc { display: block; }
  .card.open { background: var(--surface2); }
  .hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 1rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header-top">
    <h1><i class="ti ti-ball-football"></i>Habilidades eFootball</h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="total-badge" id="total-badge">Total: 226</span>
      <button onclick="openEditor()" style="background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;"><i class="ti ti-edit"></i> Editar</button>
    </div>
  </div>
  <div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border-radius:12px;border:0.5px solid var(--border-strong);padding:1.5rem;width:90%;max-width:480px;">
      <h2 style="font-size:15px;font-weight:600;margin-bottom:0.5rem;">Editar en GitHub</h2>
      <p style="font-size:12px;color:var(--text3);margin-bottom:1rem;">Pega la URL de tu archivo index.html en GitHub para editarlo directamente.</p>
      <input id="edit-url" type="url" placeholder="https://github.com/tuusuario/repo/edit/main/index.html" style="width:100%;padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:13px;margin-bottom:1rem;">
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="closeEditor()" style="background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:6px 14px;font-size:13px;color:var(--text2);cursor:pointer;">Cancelar</button>
        <button onclick="goEdit()" style="background:#1e40af;border:none;border-radius:var(--radius);padding:6px 14px;font-size:13px;color:#fff;cursor:pointer;font-weight:500;">Ir a editar</button>
      </div>
    </div>
  </div>
  <div class="controls">
    <span style="font-size:12px;color:var(--text3)">Orden:</span>
    <div class="sort-group">
      <button class="sort-btn active" onclick="setSort('score')">Por puntuación</button>
      <button class="sort-btn" onclick="setSort('alpha')">Alfabético</button>
    </div>
    <button class="dark-toggle" onclick="toggleDark()" id="dark-btn"><i class="ti ti-moon"></i> Modo oscuro</button>
  </div>
  <div class="filters" id="filters"></div>
  <div id="content"></div>
  <p class="hint"><i class="ti ti-hand-click" style="font-size:12px;vertical-align:-1px;margin-right:3px;"></i>Toca una habilidad para ver su descripción</p>
</div>
<script>
const CAT_COLORS = {
  'Habilidades defensivas': { bar:'#1baf7a', border:'#1baf7a', light:'#d6f0e3', dark:'#0a3d25', text:'#0a5c30' },
  'Habilidades de regate':  { bar:'#4a3aa7', border:'#4a3aa7', light:'#e0dcfa', dark:'#1e1750', text:'#2e1f8a' },
  'Habilidades de pase':    { bar:'#2a78d6', border:'#2a78d6', light:'#dbeafe', dark:'#1e3a5f', text:'#1e40af' },
  'Habilidades de tiro':    { bar:'#e34948', border:'#e34948', light:'#fad6d6', dark:'#4a1010', text:'#a02020' },
  'Otras habilidades':      { bar:'#eda100', border:'#eda100', light:'#faf0d0', dark:'#3d2e00', text:'#7a5500' },
};
const CAT_ICONS = {
  'Habilidades defensivas':'ti-shield','Habilidades de regate':'ti-run',
  'Habilidades de pase':'ti-arrow-right','Habilidades de tiro':'ti-target','Otras habilidades':'ti-sparkles'
};
const scores = {
  "Amago por detrás y giro":7,"As en la manga":5,"Bloqueador":7,"Bicicleta":3,
  "Cabeceador":7,"Capitanía":5,"Control con la suela":12,"Croqueta":4,
  "Delantero atrasado":4,"Despeje acrobático":3,"Disparo ascendente":4,
  "Disparo descendente":5,"Disparo sin rotación":5,"Disparo lejano con rosca":6,
  "Elástica":0,"Entrada deslizante":6,"Especialista en penaltis":3,
  "Espíritu de lucha":0,"Espuela":6,"Finalización acrobática":5,
  "Golpeo con rosca":8,"Interceptador":15,"Marcaje":8,"Marsellesa":6,
  "Pase al primer toque":7,"Pase en profundidad":11,"Pase al hueco":6,
  "Pase cruzado":6,"Picardía":7,"Pase sin mirar":4,"Pase bombeado bajo":5,
  "Rabona":5,"Rebote interior":2,"Recorte con giro":5,"Remate al primer toque":10,
  "Saque de banda largo":1,"Superioridad aérea":11,"Sombrero":5,
  "Tiro de larga distancia":3,"Vaselina":4
};
const allSkills = [
  ["Despeje acrobático","Habilidades defensivas","Permite despejar el balón con los pies desde posiciones difíciles."],
  ["Marcaje","Habilidades defensivas","Permite pegarse y perseguir al rival de forma persistente."],
  ["Superioridad aérea","Habilidades defensivas","Mejora las opciones de ganar duelos aéreos."],
  ["Interceptador","Habilidades defensivas","Mejora las habilidades de interceptación."],
  ["Delantero atrasado","Habilidades defensivas","Presiona agresivamente al rival desde la delantera."],
  ["Bloqueador","Habilidades defensivas","Mejora las opciones de bloquear pases y disparos."],
  ["Entrada deslizante","Habilidades defensivas","Mejora las opciones de ganar el balón con una entrada."],
  ["Elástica","Habilidades de regate","Ejecuta el Flip Flap."],
  ["Rebote interior","Habilidades de regate","Ejecuta el Inside Bounce."],
  ["Marsellesa","Habilidades de regate","Ejecuta la Ruleta de Marsella."],
  ["Rabona","Habilidades de regate","Ejecuta la Rabona para pasar o disparar por sorpresa."],
  ["Bicicleta","Habilidades de regate","Ejecuta la Bicicleta a alta velocidad."],
  ["Control con la suela","Habilidades de regate","Permite el control con la suela para amagues y giros."],
  ["Sombrero","Habilidades de regate","Ejecuta el Sombrero y el Boomerang Trap."],
  ["Amago por detrás y giro","Habilidades de regate","Ejecuta el Cut Behind."],
  ["Croqueta","Habilidades de regate","Resetea el equilibrio. Con croqueta + tiro el portero no tiene tiempo de reaccionar."],
  ["Recorte con giro","Habilidades de regate","Ejecuta el Chop Turn rápidamente."],
  ["Picardía","Otras habilidades","Permite ganar faltas en posesión del balón."],
  ["Espuela","Otras habilidades","Permite pasar y disparar con el talón desde posiciones difíciles."],
  ["As en la manga","Otras habilidades","Aumenta la Actitud ofensiva y la Finalización en un 5%."],
  ["Cabeceador","Otras habilidades","Aumenta la frecuencia de cabezazos hacia abajo para mayor precisión."],
  ["Capitanía","Otras habilidades","Inspira al equipo, reduciendo los efectos de la fatiga para todos."],
  ["Espíritu de lucha","Otras habilidades","Reduce el error de pases y disparos cuando hay rivales cerca."],
  ["Pase sin mirar","Habilidades de pase","Permite pases que despistan a los rivales."],
  ["Pase cruzado","Habilidades de pase","El pase raso y bombeado aumentan un 10% según el botón pulsado."],
  ["Pase en profundidad","Habilidades de pase","El pase raso y bombeado aumentan un 20% según el botón pulsado."],
  ["Pase al primer toque","Habilidades de pase","Reduce el error del pase al primer toque."],
  ["Pase bombeado bajo","Habilidades de pase","Pase bombeado largo con trayectoria baja y precisa."],
  ["Pase al hueco","Habilidades de pase","Permite pases que meten en profundidad a los compañeros."],
  ["Saque de banda largo","Habilidades de pase","Mejora el alcance de los saques de banda largos."],
  ["Especialista en penaltis","Habilidades de tiro","Aumenta la finalización y el tiro libre un 10% en penaltis."],
  ["Tiro de larga distancia","Habilidades de tiro","Aumenta la finalización un 10%."],
  ["Remate al primer toque","Habilidades de tiro","Reduce el error del disparo al primer toque."],
  ["Disparo lejano con rosca","Habilidades de tiro","Aumenta Finalización y Potencia de tiro más de un 10% con efecto."],
  ["Finalización acrobática","Habilidades de tiro","Añade animaciones a disparos: escorpión, chilena, etc."],
  ["Golpeo con rosca","Habilidades de tiro","Permite disparar y pasar con el exterior del pie a larga distancia."],
  ["Disparo ascendente","Habilidades de tiro","Disparos con trayectoria baja que suben bruscamente."],
  ["Disparo descendente","Habilidades de tiro","Disparos con efecto top spin que rebotan de forma errática ante el portero."],
  ["Disparo sin rotación","Habilidades de tiro","Permite golpeos sin efecto con mayor facilidad."],
  ["Vaselina","Habilidades de tiro","Permite vaselinas precisas."],
];
const MAX = 15;
let currentCat = 'Todas', currentSort = 'score';
let darkMode = false;

function openEditor() {
  const modal = document.getElementById('edit-modal');
  modal.style.display = 'flex';
  const saved = localStorage.getItem('edit-url');
  if (saved) document.getElementById('edit-url').value = saved;
}
function closeEditor() {
  document.getElementById('edit-modal').style.display = 'none';
}
function goEdit() {
  const url = document.getElementById('edit-url').value.trim();
  if (!url) return;
  localStorage.setItem('edit-url', url);
  window.open(url, '_blank');
  closeEditor();
}
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditor();
});
function toggleDark() {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-mode', darkMode ? 'dark' : '');
  document.getElementById('dark-btn').innerHTML = darkMode
    ? '<i class="ti ti-sun"></i> Modo claro'
    : '<i class="ti ti-moon"></i> Modo oscuro';
}
function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', (s==='score' && b.textContent.trim()==='Por puntuación') || (s==='alpha' && b.textContent.trim()==='Alfabético'))
  );
  render();
}
function setFilter(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}
function getScore(name) {
  for (const [k,v] of Object.entries(scores)) {
    if (k.toLowerCase()===name.toLowerCase()) return v;
  }
  return null;
}
function makeCard(name, desc, col) {
  const s = getScore(name);
  const pct = s !== null ? Math.round((s/MAX)*100) : 0;
  const scoreColor = s===null ? '' : s===0 ? '#e34948' : s>=8 ? '#2a78d6' : s>=4 ? '#888' : '#bbb';
  const scoreHtml = s !== null
    ? `<div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${col.bar}"></div></div><span class="score" style="color:${scoreColor}">${s}</span>`
    : `<span style="font-size:11px;color:var(--text3);font-style:italic">—</span>`;
  return `<div class="card" style="border-left-color:${col.bar}" onclick="this.classList.toggle('open')">
    <div class="card-top">
      <span class="card-name">${name}</span>
      <div class="card-right">${scoreHtml}</div>
    </div>
    <div class="desc">${desc}</div>
  </div>`;
}
function render() {
  const filtered = currentCat==='Todas' ? allSkills : allSkills.filter(s=>s[1]===currentCat);
  const sorted = [...filtered].sort((a,b) => {
    if (currentSort==='score') {
      const sa=getScore(a[0])??-1, sb=getScore(b[0])??-1;
      return sb-sa || a[0].localeCompare(b[0]);
    }
    return a[0].localeCompare(b[0]);
  });
  const totalScore = Object.values(scores).reduce((a,b)=>a+b,0);
  document.getElementById('total-badge').textContent = currentCat==='Todas'
    ? `Total: ${totalScore}` : `${filtered.length} habilidades`;

  const content = document.getElementById('content');
  if (currentCat==='Todas') {
    const cats = [...new Set(allSkills.map(s=>s[1]))];
    content.innerHTML = cats.map(cat => {
      const catSkills = sorted.filter(s=>s[1]===cat);
      if (!catSkills.length) return '';
      const col = CAT_COLORS[cat];
      const icon = CAT_ICONS[cat]||'ti-star';
      return `<div class="section">
        <div class="section-title"><i class="ti ${icon}"></i>${cat}</div>
        <div class="grid">${catSkills.map(([n,,d])=>makeCard(n,d,col)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    const col = CAT_COLORS[currentCat];
    content.innerHTML = `<div class="grid">${sorted.map(([n,,d])=>makeCard(n,d,col)).join('')}</div>`;
  }
}

const cats = ['Todas',...new Set(allSkills.map(s=>s[1]))];
const filtersEl = document.getElementById('filters');
cats.forEach(cat => {
  const col = CAT_COLORS[cat];
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat==='Todas' ? ' active' : '');
  btn.dataset.cat = cat;
  btn.textContent = cat;
  if (col) {
    btn.style.cssText = `border-color:${col.bar};color:${col.text}`;
    btn.addEventListener('click', () => {
      setFilter(cat);
      document.querySelectorAll('.filter-btn').forEach(b => {
        const c = CAT_COLORS[b.dataset.cat];
        if (c) b.style.cssText = b.classList.contains('active')
          ? `background:${c.light};border-color:${c.bar};color:${c.text};font-weight:500`
          : `border-color:${c.bar};color:${c.text}`;
        else b.style.cssText = '';
      });
    });
  } else {
    btn.onclick = () => setFilter(cat);
  }
  filtersEl.appendChild(btn);
});
render();
</script>
</body>
</html>
